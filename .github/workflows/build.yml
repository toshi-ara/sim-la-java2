name: Build and Pakcage

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build packages (Linux)
        if: matrix.platform == 'linux'
        run: |
          ./gradlew packageLinuxLight packageLinuxFull
          ./fix-permissions-light.sh
          ./fix-permissions-full.sh

      - name: Build packages (Windows)
        if: matrix.platform == 'windows'
        run: ./gradlew packageWindowsFull

      - uses: actions/upload-artifact@v4
        with:
          name: distributions-${{ matrix.platform }}
          path: |
            build/dist/*.zip
            build/dist/*.tar.bz2

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.bz2
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

